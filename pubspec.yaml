name: DasCobras
description: ""

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  http: ^1.2.0
  shared_preferences: ^2.2.2
  supabase_flutter: ^2.12.4
  provider: ^6.1.5
  mask_text_input_formatter: ^2.9.0
  flutter_dotenv: ^5.1.0
  local_auth: ^2.3.0

  image_picker: ^1.1.2

  intl: ^0.20.2

  pdf: ^3.11.3
  printing: ^5.14.2
  path_provider: ^2.1.5
  open_filex: ^4.7.0

  share_plus: ^11.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "lib/app/assets/img/LogoApp.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true

  assets:
    - .env
    - lib/app/assets/img/Logo.png
    - lib/app/assets/img/LogoLonga.png
    - lib/app/assets/img/LogoApp.png
