name: DasCobras
description: ""

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  flutter_localizations:
    sdk: flutter

  http: ^1.2.0
  shared_preferences: ^2.2.2
  supabase_flutter: ^2.12.4
  provider: ^6.1.5
  cupertino_icons: ^1.0.8
  mask_text_input_formatter: ^2.9.0
  flutter_dotenv: ^5.1.0

  local_auth: ^2.3.0

  # Selecionar imagens da galeria
  image_picker: ^1.1.2

  # Formatação de datas
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "lib/app/assets/img/LogoApp.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true

  assets:
    - .env
    - lib/app/assets/img/Logo.png
    - lib/app/assets/img/LogoLonga.png
    - lib/app/assets/img/LogoApp.png
